paths:
  data_dir: ./Data
  ancillary_dir: ./Ancillary_material
  output_dir: ./Outputs

input:
  cube_file: NGC4388_test_OIII.fits
  sn_map: SN_map_NGC4388_OIII.fits
  save_all_outputs: false

target:
  agn_ra: '12h25m46.7813s'
  agn_dec: '+12d39m43.761s'
  center_mode: null
  center_xy_manual: null
  redshift: 0.008419

line:
  wavelength_line: 5006.8
  wavelength_line_unit: Angstrom

processing:
  sn_thresh: 3
  nrebin: 1
  xrange: null
  yrange: null
  percentile_shown_mom_maps:
    - [1, 99]
    - [1, 99]
    - [1, 99]
  psf_sigma: 1
  lsf_sigma: 72.0
  vel_sigma: 0.0

maps:
  fluxmap: null
  velmap: null
  sigmap: null

fit:
  component_mode: disk_then_outflow

  radius_range_model_disc: [0.0, 50.0]
  radius_range_model_out: [0.0, 35.0]

  num_shells_disc: 50
  num_shells_out: 35

  disc_pa_deg: null

  beta_grid_disc: [10, 90, 5]
  v_grid_disc: [100, 500, 20]

  outflow_pa_deg: 160
  outflow_opening_deg: 110
  outflow_double_cone: true
  outflow_mask_mode: bicone

  beta_grid_out: [60, 140, 5]
  v_grid_out: [0, 1200, 20]

advanced:
  check_masking_before_fitting: true
  use_crps: false
  perc_disc: [0.05, 0.95]
  perc_out: [0.01, 0.99]
  perc_weights: [1, 1]

  npt: 300000

  use_global_beta_disc: true
  disc_fit_mode: independent
  disc_theta_range:
    - [0, 1]
  disc_phi_range:
    - [0, 360]
  disc_zeta_range_mode: auto_from_psf

  use_global_beta_out: true
  mask_disk_with_outflow: true
  do_final_combined_model_plot: true
  outflow_axis_sign: 1

  resid_ranges: [0.15, 55, 55]

output:
  save_plots: true
  show_plots: false
  save_summary_json: true
  save_run_config_copy: true
  overwrite: true
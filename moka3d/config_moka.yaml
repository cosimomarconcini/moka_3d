paths:
  data_dir: ./Data
  ancillary_dir: ./Ancillary_material
  output_dir: ./Outputs

input:
  cube_file: NGC4388_test_OIII.fits
  sn_map: SN_map_NGC4388_OIII.fits
  save_all_outputs: true

target:
  agn_ra: 12h25m46.7813s
  agn_dec: +12d39m43.761s
  center_mode: null               #  flux    |  kinematic
  center_xy_manual: null          #  [ x_coord, y_coord ]
  redshift: 0.008419

line:
  wavelength_line: 5006.8
  wavelength_line_unit: Angstrom

processing:
  sn_thresh: 3
  nrebin: 1
  xrange: null
  yrange: null
  pixel_scale_arcsec_manual: null
  display_ranges:
    flux:
      mode: percentile                # fixed    |    percentile
      values: [1, 99]

    vel:
      mode: percentile                     # fixed    |    percentile
      values: [1, 99]

    sig:
      mode: percentile                # fixed    |    percentile
      values: [1, 99]

  psf_sigma: 1
  lsf_sigma: 50.0
  vel_sigma: 0.0

maps:
  fluxmap: null
  velmap: null
  sigmap: null

fit:
  component_mode: outflow          # disk        | outflow     | disk_then_outflow
  disc:
    mode: independent              # independent | disk_kepler | NSC | Plummer | disk_arctan

    radius_range_arcsec: [0.0, 35]
    num_shells: 35

    pa_deg: null
    pa_unc_deg: 5

    beta_grid_deg: [30, 70, 2]

    independent:
      v_grid_kms: [0.0, 500.0, 10.0]

    kepler:
      mbh_grid_msun: [1.0e6, 1.0e11]
      n_geom: 50

    nsc:
      re_pc: 5.0
      a_grid: [1.0e-3, 1.0e4]
      n_geom: 50

    plummer:
      a_pc: 4.0
      m0_grid_msun: [1.0e6, 1.0e11]
      n_geom: 50

    arctan:
      rt_arcsec: null
      vmax_grid_kms: [0.0, 500.0, 10.0]


  outflow:
    radius_range_arcsec: [0.0, 38]
    num_shells: 38
    pa_deg: 160
    opening_deg: 120
    double_cone: true
    mask_mode: bicone

    beta_grid_deg: [60, 130, 10]
    v_grid_kms: [0.0, 800.0, 50.0]

advanced:
  check_masking_before_fitting: false
  use_crps: false
  perc_disc: [0.05, 0.95]
  perc_out: [0.01, 0.99]
  perc_weights: [1, 1]

  npt: 50000

  use_global_beta_disc: true

  disc_theta_range:
    - [0, 1]
  disc_phi_range:
    - [0, 360]
  disc_zeta_range_mode: auto_from_psf

  use_global_beta_out: true
  mask_disk_with_outflow: true
  do_final_combined_model_plot: true
  outflow_axis_sign: 1

  resid_ranges: [0.5, 50, 50]
  compute_escape_fraction: false
  save_escape_fraction_table: false

output:
  save_plots: true
  show_plots: false
  save_summary_json: true
  save_run_config_copy: true
  overwrite: true

paths:
  data_dir: ./Data
  ancillary_dir: ./Ancillary_material
  output_dir: ./Outputs

input:
  cube_file: NGC7582_test_OIII_smooth.fits
  sn_map: SN_map_NGC7582.fits       
  save_all_outputs: true
  ne_map: null                  # path to 2D FITS density map in ancillary_dir; null if unavailable
  ne_outflow: null              # null OR [single_value] OR [ne_plus, ne_minus]
                                # examples:
                                # single cone (+): [400]
                                # single cone (-): [500]
                                # bicone: [400, 500]


target:
  agn_ra: 23h18m23.6280s          # takes either degree or hms
  agn_dec: -42d22m13.512s         # takes either degree or hms
  center_mode: null               #  flux    |  kinematic
  center_xy_manual: null          #  [ x_coord, y_coord ]
  redshift: 0.005410

line:
  wavelength_line: 5006.8
  wavelength_line_unit: Angstrom          # Angstrom     |    micron  | GHz  \ 

processing:
  sn_thresh: 3
  nrebin: 1
  xrange: null
  yrange: null
  pixel_scale_arcsec_manual: null
  display_ranges:
    flux:
      mode: percentile                # fixed    |    percentile
      values: [1, 99]

    vel:
      mode: percentile                # fixed    |    percentile
      values: [1, 99]

    sig:
      mode: percentile                # fixed    |    percentile
      values: [1, 99]

  psf_sigma: [0.5]                   # [psf sigma] if simmetric, otherwise [bmaj, bmin, P.A.]
  lsf_sigma: 73.0
  vel_sigma: 0.0
maps:
  fluxmap: null
  velmap: null
  sigmap: null

fit:
  component_mode: disk_then_outflow          # disk        | outflow     | disk_then_outflow
  disc:
    mode: independent              # independent | disk_kepler | NSC | Plummer | disk_arctan

    radius_range_arcsec: [0.0, 45]
    num_shells: 45

    pa_deg: null
    pa_unc_deg: null

    beta_grid_deg: [30, 90, 3]

    independent:
      v_grid_kms: [0.0, 400.0, 20.0]

    kepler:
      mbh_grid_msun: [1.0e6, 1.0e11]
      n_geom: 50

    nsc:
      re_pc: 5.0
      a_grid: [1.0e-3, 1.0e4]
      n_geom: 50

    plummer:
      a_pc: 4.0
      m0_grid_msun: [1.0e6, 1.0e11]
      n_geom: 50

    arctan:
      rt_arcsec: null
      vmax_grid_kms: [0.0, 500.0, 10.0]


  outflow:
    radius_range_arcsec: [0.0, 30]
    num_shells: 30
    pa_deg: 110
    opening_deg: 120
    double_cone: true
    mask_mode: bicone

    beta_grid_deg: [50, 130, 5]
    v_grid_kms: [0.0, 1200.0, 25.0]

advanced:
  check_masking_before_fitting: true
  use_crps: false
  perc_disc: [0.05, 0.95]
  perc_out: [0.01, 0.99]
  perc_weights: [1, 1]

  npt: 200000

  use_global_beta_disc: true

  disc_theta_range:
    - [0, 1]
  disc_phi_range:
    - [0, 360]
  disc_zeta_range_mode: auto_from_psf         # this means thin disk approssimation, i.e. disc_thickness == PSF

  use_global_beta_out: true
  mask_disk_with_outflow: true
  do_final_combined_model_plot: true
  outflow_axis_sign: 1

  resid_ranges: [0.15, 45, 45]
  compute_escape_fraction: true
  save_escape_fraction_table: false

  compute_energetics: true
  save_energetics_table: true
  assumed_ne_values: [100.0, 500.0, 1000.0]
  oiii_metallicity_z_over_zsun: 1.0

output:
  save_plots: true
  show_plots: false
  save_summary_json: true
  save_run_config_copy: true
  overwrite: true
